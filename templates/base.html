<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>{% block title %}Chef Builder — AI Wellness{% endblock %}</title>
<!-- PWA -->
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}"/>
<meta name="theme-color" content="#0f1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}"/>
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
{% block head %}{% endblock %}
</head>
<body>
<!-- Ambient background -->
<div class="ambient-bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">🍃</div>
    <span class="brand-text">Chef<span class="accent">Builder</span></span>
  </div>
  <div class="sidebar-nav">
    <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
      <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
    </a>
    <a href="/log" class="nav-item {% if request.path == '/log' %}active{% endif %}">
      <i data-lucide="utensils"></i><span>Food Log</span>
    </a>
    <a href="/chat" class="nav-item {% if request.path == '/chat' %}active{% endif %}">
      <i data-lucide="bot"></i><span>AI Coach</span>
    </a>
    <a href="/recipes" class="nav-item {% if request.path == '/recipes' %}active{% endif %}">
      <i data-lucide="chef-hat"></i><span>Recipes</span>
    </a>
    <a href="/planner" class="nav-item {% if request.path == '/planner' %}active{% endif %}">
      <i data-lucide="calendar-days"></i><span>Meal Planner</span>
    </a>
    <a href="/grocery" class="nav-item {% if request.path == '/grocery' %}active{% endif %}">
      <i data-lucide="shopping-cart"></i><span>Grocery List</span>
    </a>
    <a href="/mindfulness" class="nav-item {% if request.path == '/mindfulness' %}active{% endif %}">
      <i data-lucide="brain"></i><span>Mindfulness</span>
    </a>
    <a href="/progress" class="nav-item {% if request.path == '/progress' %}active{% endif %}">
      <i data-lucide="trending-up"></i><span>Progress</span>
    </a>
    <div class="nav-divider"></div>
    <a href="/profile" class="nav-item {% if request.path == '/profile' %}active{% endif %}">
      <i data-lucide="user-circle"></i><span>Profile</span>
    </a>
  </div>
  <div class="sidebar-footer">
    <!-- Dark mode toggle -->
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark/light mode">
      <i data-lucide="moon" id="themeIconDark"></i>
      <i data-lucide="sun" id="themeIconLight" style="display:none"></i>
      <span id="themeLabel">Dark Mode</span>
    </button>
    <div class="ai-badge">
      <i data-lucide="sparkles"></i>
      <span>Powered by Claude AI</span>
    </div>
  </div>
</nav>

<!-- Mobile nav toggle -->
<button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
  <i data-lucide="menu"></i>
</button>
<div class="nav-overlay" id="navOverlay"></div>

<!-- Main content -->
<main class="main-content" id="main">
  {% block content %}{% endblock %}
</main>

<!-- Mobile bottom nav -->
<nav class="mobile-nav">
  <a href="/" class="mobile-nav-item {% if request.path == '/' %}active{% endif %}">
    <i data-lucide="layout-dashboard"></i><span>Home</span>
  </a>
  <a href="/log" class="mobile-nav-item {% if request.path == '/log' %}active{% endif %}">
    <i data-lucide="utensils"></i><span>Log</span>
  </a>
  <a href="/chat" class="mobile-nav-item {% if request.path == '/chat' %}active{% endif %}">
    <i data-lucide="bot"></i><span>AI</span>
  </a>
  <a href="/progress" class="mobile-nav-item {% if request.path == '/progress' %}active{% endif %}">
    <i data-lucide="trending-up"></i><span>Progress</span>
  </a>
  <a href="/planner" class="mobile-nav-item {% if request.path == '/planner' %}active{% endif %}">
    <i data-lucide="calendar-days"></i><span>Plan</span>
  </a>
</nav>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
lucide.createIcons();

// Nav toggle
document.getElementById('navToggle')?.addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('navOverlay').classList.toggle('visible');
});
document.getElementById('navOverlay')?.addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('navOverlay').classList.remove('visible');
});

// Toast
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast toast-${type} show`;
  setTimeout(() => t.classList.remove('show'), 3500);
}

// Dark/Light mode
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  const dark = document.getElementById('themeIconDark');
  const light = document.getElementById('themeIconLight');
  const label = document.getElementById('themeLabel');
  if (theme === 'light') {
    dark.style.display = 'none';
    light.style.display = 'inline';
    label.textContent = 'Light Mode';
  } else {
    dark.style.display = 'inline';
    light.style.display = 'none';
    label.textContent = 'Dark Mode';
  }
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(current === 'dark' ? 'light' : 'dark');
}

// Apply saved theme on load
(function() {
  const saved = localStorage.getItem('theme') || 'dark';
  applyTheme(saved);
})();

// PWA service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js').catch(() => {});
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
